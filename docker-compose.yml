services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tn_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tn_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    profiles: ["optional"]

volumes:
  tn_pgdata:
